name: rust-ci
git_credentials:
  username: your_username
  password: your_token_or_password
steps:
- name: ping-pong
  commands:
  - COUNTER_FILE=pipelight-misc/ping-pong-counter; mkdir -p pipelight-misc; COUNT=$(cat "$COUNTER_FILE" 2>/dev/null || echo 0); COUNT=$((COUNT + 1)); echo "$COUNT" > "$COUNTER_FILE"; echo "ping (round $COUNT/10)"; if [ "$COUNT" -ge 10 ]; then rm -f "$COUNTER_FILE"; exit 0; fi; exit 1
  on_failure:
    callback_command: ping
    max_retries: 9
    context_paths: []
    exceptions:
      ping:
        command: ping
        max_retries: 9
  local: true
  active: false
- name: git-pull
  commands:
  - if [ ! -d .git ]; then echo 'Not a git repository, skipping'; exit 0; fi
  - if ! git remote | grep -q .; then echo 'No remote configured, skipping'; exit 0; fi
  - echo "Pulling from $(git remote get-url origin 2>/dev/null || git remote get-url $(git remote | head -1))..."
  - STASHED=false; if ! git diff --quiet || ! git diff --cached --quiet; then echo 'Stashing local changes...'; git stash && STASHED=true; fi
  - 'git pull --rebase || { if $STASHED; then git stash pop; fi; echo ''ERROR: git pull --rebase failed — possible merge conflict''; exit 1; }'
  - 'if $STASHED; then echo ''Restoring stashed changes...''; git stash pop || { echo ''ERROR: stash pop conflict — run git stash pop manually''; exit 1; }; fi'
  depends_on:
  - ping-pong
  on_failure:
    callback_command: git_fail
    max_retries: 0
    context_paths: []
  local: true
- name: git-diff
  commands:
  - |-
    if ! git rev-parse --git-dir >/dev/null 2>&1; then echo 'git-diff: not a git repository — skipping'; exit 0; fi
    REPORT_DIR=pipelight-misc/git-diff-report
    mkdir -p "$REPORT_DIR"
    UPSTREAM=$(git rev-parse --abbrev-ref --symbolic-full-name @{upstream} 2>/dev/null || true)
    UNSTAGED=$(git diff --name-only --diff-filter=ACMR 2>/dev/null | while read f; do [ -f "$f" ] && echo "$f"; done)
    STAGED=$(git diff --cached --name-only --diff-filter=ACMR 2>/dev/null | while read f; do [ -f "$f" ] && echo "$f"; done)
    UNPUSHED=""
    if [ -n "$UPSTREAM" ]; then
      UNPUSHED=$(git diff "$UPSTREAM"..HEAD --name-only --diff-filter=ACMR 2>/dev/null | while read f; do [ -f "$f" ] && echo "$f"; done)
    fi
    printf '%s\n' "$UNSTAGED"  | sed '/^$/d' > "$REPORT_DIR/unstaged.txt"
    printf '%s\n' "$STAGED"    | sed '/^$/d' > "$REPORT_DIR/staged.txt"
    printf '%s\n' "$UNPUSHED"  | sed '/^$/d' > "$REPORT_DIR/unpushed.txt"
    U=$(wc -l < "$REPORT_DIR/unstaged.txt" | tr -d ' ')
    S=$(wc -l < "$REPORT_DIR/staged.txt"   | tr -d ' ')
    P=$(wc -l < "$REPORT_DIR/unpushed.txt" | tr -d ' ')
    TOTAL=$((U + S + P))
    if [ "$TOTAL" -eq 0 ]; then echo 'git-diff: working tree clean and no unpushed commits — skipping'; exit 0; fi
    echo "git-diff: $TOTAL change record(s) on current branch"
    echo "  unstaged: $U file(s)"
    echo "  staged: $S file(s)"
    if [ -n "$UPSTREAM" ]; then echo "  unpushed (ahead of $UPSTREAM): $P file(s)"; else echo "  unpushed: n/a (no upstream configured)"; fi
    exit 1
  depends_on:
  - git-pull
  allow_failure: true
  on_failure:
    callback_command: git_diff_command
    max_retries: 0
    context_paths:
    - pipelight-misc/git-diff-report/staged.txt
    - pipelight-misc/git-diff-report/unpushed.txt
    - pipelight-misc/git-diff-report/unstaged.txt
    exceptions:
      git_diff_changes_found:
        command: git_diff_command
        max_retries: 0
        context_paths:
        - pipelight-misc/git-diff-report/unstaged.txt
        - pipelight-misc/git-diff-report/staged.txt
        - pipelight-misc/git-diff-report/unpushed.txt
  local: true
- name: build
  image: rust:latest
  commands:
  - cargo build
  depends_on:
  - git-diff
  on_failure:
    callback_command: auto_fix
    max_retries: 3
    context_paths:
    - Cargo.toml
    - src/
    exceptions:
      compile_error:
        command: auto_fix
        max_retries: 3
        context_paths:
        - src/
        - Cargo.toml
- name: clippy
  image: rust:latest
  commands:
  - rustup component add clippy 2>/dev/null; cargo clippy -- -D warnings
  depends_on:
  - build
  on_failure:
    callback_command: auto_fix
    max_retries: 2
    context_paths:
    - src/
    exceptions:
      clippy_error:
        command: auto_fix
        max_retries: 2
        context_paths:
        - src/
- name: test
  image: rust:latest
  commands:
  - cargo test
  depends_on:
  - build
  on_failure:
    callback_command: abort
    max_retries: 0
    context_paths: []
    exceptions:
      test_success:
        command: test_print_command
        max_retries: 0
- name: fmt-check
  image: rust:latest
  commands:
  - rustup component add rustfmt 2>/dev/null; cargo fmt -- --check
  depends_on:
  - git-diff
  on_failure:
    callback_command: auto_fix
    max_retries: 1
    context_paths:
    - src/
    exceptions:
      fmt_error:
        command: auto_fix
        max_retries: 1
        context_paths:
        - src/
