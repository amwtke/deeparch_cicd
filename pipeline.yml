name: rust-ci
git_credentials:
  username: your_username
  password: your_token_or_password
steps:
- name: ping-pong
  commands:
  - COUNTER_FILE=pipelight-misc/ping-pong-counter; mkdir -p pipelight-misc; COUNT=$(cat "$COUNTER_FILE" 2>/dev/null || echo 0); COUNT=$((COUNT + 1)); echo "$COUNT" > "$COUNTER_FILE"; echo "ping (round $COUNT/10)"; if [ "$COUNT" -ge 10 ]; then rm -f "$COUNTER_FILE"; exit 0; fi; exit 1
  on_failure:
    callback_command: ping
    max_retries: 9
    context_paths: []
    exceptions:
      ping:
        command: ping
        max_retries: 9
  local: true
  active: false
- name: git-pull
  commands:
  - if [ ! -d .git ]; then echo 'Not a git repository, skipping'; exit 0; fi
  - if ! git remote | grep -q .; then echo 'No remote configured, skipping'; exit 0; fi
  - echo "Pulling from $(git remote get-url origin 2>/dev/null || git remote get-url $(git remote | head -1))..."
  - STASHED=false; if ! git diff --quiet || ! git diff --cached --quiet; then echo 'Stashing local changes...'; git stash && STASHED=true; fi
  - 'git pull --rebase || { if $STASHED; then git stash pop; fi; echo ''ERROR: git pull --rebase failed — possible merge conflict''; exit 1; }'
  - 'if $STASHED; then echo ''Restoring stashed changes...''; git stash pop || { echo ''ERROR: stash pop conflict — run git stash pop manually''; exit 1; }; fi'
  depends_on:
  - ping-pong
  on_failure:
    callback_command: git_fail
    max_retries: 0
    context_paths: []
  local: true
- name: build
  image: rust:latest
  commands:
  - cargo build
  depends_on:
  - git-pull
  on_failure:
    callback_command: auto_fix
    max_retries: 3
    context_paths:
    - Cargo.toml
    - src/
    exceptions:
      compile_error:
        command: auto_fix
        max_retries: 3
        context_paths:
        - src/
        - Cargo.toml
- name: clippy
  image: rust:latest
  commands:
  - rustup component add clippy 2>/dev/null; cargo clippy -- -D warnings
  depends_on:
  - build
  on_failure:
    callback_command: auto_fix
    max_retries: 2
    context_paths:
    - src/
    exceptions:
      clippy_error:
        command: auto_fix
        max_retries: 2
        context_paths:
        - src/
- name: test
  image: rust:latest
  commands:
  - cargo test
  depends_on:
  - build
  on_failure:
    callback_command: abort
    max_retries: 0
    context_paths: []
- name: fmt-check
  image: rust:latest
  commands:
  - rustup component add rustfmt 2>/dev/null; cargo fmt -- --check
  depends_on:
  - git-pull
  on_failure:
    callback_command: auto_fix
    max_retries: 1
    context_paths:
    - src/
    exceptions:
      fmt_error:
        command: auto_fix
        max_retries: 1
        context_paths:
        - src/
